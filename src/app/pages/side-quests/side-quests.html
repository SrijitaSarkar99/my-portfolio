<main class="side-quests">
  <header class="side-quests-intro">
    <h1>Side Quests</h1>
    <p>When I'm away from the keyboard, I like making things with my hands — crochet, painting, and sculpting.</p>
  </header>

  <section class="gallery">
    @for (art of artworks; track art.title) {
      <figure class="gallery-item">
        <img [src]="art.image" [alt]="art.title" loading="lazy" />
        <figcaption>
          <span class="title">{{ art.title }}</span>
          <span class="category">{{ art.category }}</span>
        </figcaption>
      </figure>
    }
  </section>
</main>
