<section id="projects" class="section">
  <h2>Projects</h2>

  <ul class="project-list">
    @for (item of projectEntries; track item.name) {
      <li class="project-item">
        <div class="project-body">
          <div class="project-head">
            <span class="name">{{ item.name }}</span>
            @if (item.link) {
              <a class="project-link" [href]="item.link" target="_blank" rel="noopener">View</a>
            }
          </div>
          <p class="description">{{ item.description }}</p>
          <span class="tech">{{ item.tech }}</span>
        </div>
        <img class="project-image" [src]="item.image" [alt]="item.name" loading="lazy" />
      </li>
    }
  </ul>
</section>
