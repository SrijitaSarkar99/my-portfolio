<section id="education" class="section">
    <h2>Education</h2>

    <ul class="edu-list">
        @for (item of educationEntries; track item.degree) {
          <li class="edu-item">
            <div class="edu-head">
              <span class="degree">{{ item.degree }}</span>
              <span class="years">{{ item.year }}</span>
            </div>
            <span class="institution">{{ item.institution }}</span>
            @if (item.description) {
              <p class="description">{{ item.description }}</p>
            }   
          </li>
        }
      </ul>
</section>
